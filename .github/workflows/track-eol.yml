name: Track EOL Dates

on:
  schedule:
    # Daily at 10:00 UTC (8:00 PM AEST) — offset from the other trackers
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  track:
    name: Check EOL Dates
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOL tracker
        run: python collect.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: EOL update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Notify via GitHub Issue
        if: hashFiles('.eol_alerts') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            const list = fs.readFileSync('.eol_alerts', 'utf8');
            const count = list.split('\n').filter(Boolean).length;
            const hasDead = list.includes('END OF LIFE');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 ${count} end-of-support alert${count === 1 ? '' : 's'}${hasDead ? ' — product reached EOL' : ''} (${today})`,
              body: `## End-of-Support Alerts\n\n${list}\n\n---\n\nSystems running end-of-life software receive **no further security updates** and should be upgraded or isolated.\n\n🌐 [Dashboard](https://tayvensec.github.io/eol-tracker/) · 📖 [endoflife.date](https://endoflife.date)\n\n*Auto-generated by eol-tracker on ${today}*`,
              labels: ["eol", "automated"]
            });

      - name: Clean up flag file
        if: always()
        run: rm -f .eol_alerts
